<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2111：晶片冒險記 - 第一章</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #05070a;
            color: #e0e6ed;
            overflow: hidden;
            margin: 0;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 1rem;
        }

        .nav-btn {
            transition: all 0.3s ease;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.3);
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(0, 255, 204, 0.3);
            border-color: rgba(0, 255, 204, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .choice-btn {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .choice-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 255, 204, 0.5);
        }

        .typing-effect::after {
            content: '|';
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .bg-grid {
            background-image: linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        #knowledge-card {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            pointer-events: none;
        }
        #knowledge-card.active {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* 核心修改：統一圖片大小與裁切邏輯 */
        .scene-display {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 0.5rem;
        }
        
        .scene-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 自動裁切填滿，不變形 */
            object-position: center; /* 始中保持中心對齊 */
            transition: opacity 0.7s ease;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2);
            border: 1px solid rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body class="bg-grid min-h-screen flex flex-col items-center justify-center p-4">

    <div id="game-viewport" class="relative w-full max-w-4xl h-[700px] glass-panel overflow-hidden flex flex-col shadow-2xl">
        
        <!-- 頂部狀態列 -->
        <div class="p-4 flex justify-between items-center border-b border-cyan-900/50 text-s tracking-widest text-cyan-500">
            <div class="flex items-center">
                <span class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse mr-2"></span>
                LOCATION: Z-CITY / DISTRICT 01
            </div>
            <div id="date-display">DATE: 2111.05.24</div>
        </div>

        <!-- 視覺呈現區 -->
        <div class="flex-grow flex items-center justify-center relative p-6 overflow-hidden bg-black/40">
            <div id="scene-display-container" class="scene-display">
                <img id="scene-photo" class="scene-img opacity-0" src="" alt="場景圖" onload="this.style.opacity=1">
            </div>
            
            <!-- 知識按鈕 -->
            <button id="info-trigger" class="hidden absolute top-10 right-10 w-12 h-12 rounded-full bg-yellow-500/20 border-2 border-yellow-500 flex items-center justify-center text-yellow-500 animate-bounce cursor-pointer z-10 hover:bg-yellow-500 hover:text-black transition-all" onclick="toggleKnowledge()">
                <span class="font-bold">i</span>
            </button>
        </div>

        <!-- 對話區域 -->
        <div class="h-80 p-8 bg-black/85 flex flex-col border-t border-cyan-900/40 relative">
            <div id="speaker-name" class="text-cyan-400 font-bold mb-2 tracking-[0.2em] text-s uppercase opacity-70">SYSTEM MESSAGE</div>
            <div id="dialog-text" class="text-xl leading-relaxed mb-4 typing-effect text-gray-100 min-h-[3.5em]"></div>
            
            <!-- 分歧選擇區 -->
            <div id="branch-container" class="flex flex-col gap-2 mb-4"></div>

            <!-- 導覽按鈕區 -->
            <div class="mt-auto flex gap-4 pt-4 border-t border-white/5">
                <button id="prev-btn" class="nav-btn flex-1 py-3 px-6 rounded-lg text-center text-sm font-bold tracking-widest text-gray-400 uppercase" onclick="goBack()">
                    ← 上一頁
                </button>
                <button id="next-btn" class="nav-btn flex-[2] py-3 px-6 rounded-lg text-center text-sm font-bold tracking-widest text-cyan-400 uppercase">
                    下一頁 →
                </button>
            </div>
        </div>
    </div>

    <!-- 知識卡片 -->
    <div id="knowledge-card" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="max-w-md w-full glass-panel p-8 relative border-yellow-500/50 border-2 shadow-[0_0_50px_rgba(234,179,8,0.2)]">
            <button class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl" onclick="toggleKnowledge()">✕</button>
            <h3 class="text-yellow-500 font-bold text-2xl mb-6 flex items-center">
                <span class="mr-3">💡</span> 未來技術筆記
            </h3>
            <div id="knowledge-content" class="text-gray-200 text-base leading-loose mb-8"></div>
            <button class="w-full py-3 bg-yellow-500 text-black font-bold hover:bg-yellow-400 transition-colors rounded-lg uppercase tracking-widest" onclick="toggleKnowledge()">確認理解</button>
        </div>
    </div>

    <script>
        const storyData = {
            "start_1": {
                speaker: "人工智能",
                text: "早安阿 ~ 又是美好的一天。",
                image: "pic/start_1.png", 
                choices: [{ text: "【下一頁】", next: "wake_1" }]
            },
            "wake_1": {
                speaker: "勇者",
                text: "（伸了個懶腰）...唔... 還是好睏啊。",
                image: "pic/wake_1.png",
                choices: [{ text: "【下一頁】", next: "wake_2" }]
            },
            "wake_2": {
                speaker: "人工智能",
                text: "趕快起床啦！太陽都要曬屁股了！快點準備登入系統！",
                image: "pic/wake_2.png",
                choices: [{ text: "【下一頁】", next: "morning_news" }]
            },
            "morning_news": {
                speaker: "人工智能",
                text: "今天早上【宇宙太陽能板】會經過【Z市】上方建議出門前吃維生素C避免營養不良，地表天氣....",
                image: "pic/morning_news.png",
                choices: [
                    { text: " 碰了碰耳朵，將【預報鬧鐘】關閉", next: "c_1_a_1" },
                    { text: "（安靜地聽完今日預報內容）", next: "c_1_b_1" }
                ]
            },
            "c_1_b_1": {
                speaker: "B (預報鬧鐘)",
                text: "今日新聞重點：AI NPC 生活的伺服器與人類的伺服器分開，避免人類的速度影響 AI 的效率。",
                image: "pic/c_1_b_1.png",
                knowledge: "<b>資源拆分概念</b><br>這涉及晶片設計中的<b>異質整合</b>。將不同性質的工作交給專屬的處理單元。",
                choices: [{ text: "【下一頁】", next: "c_1_b_2" }]
            },
            "c_1_b_2": {
                speaker: "勇者",
                text: "昨天玩了一天的【戰地王者】感覺好爽阿",
                image: "pic/c_1_b_2.png",
                choices: [{ text: "【下一頁】", next: "e_1_1" }]
            },
            "c_1_a_1": {
                speaker: "勇者",
                text: "昨天玩了一天的【戰地王者】感覺好累阿，超級不想講話的",
                image: "pic/c_1_a_2.png",
                choices: [{ text: "【下一頁】", next: "c_1_a_2" }]
            },
            "c_1_a_2": {
                speaker: "勇者",
                text: "忘記把【預報鬧鐘】關了被吵醒就睡不著了",
                image: "pic/c_1_a_1.png",
                choices: [{ text: "【下一頁】", next: "e_1_1" }]
            },
            "e_1_1": {
                speaker: "勇者",
                text: "誰阿",
                image: "pic/e_1_1.png",
                choices: [{ text: "重新開始體驗", next: "e_1_2" }]
            },
            "e_1_2": {
                speaker: "朋友",
                text: "ㄟㄟ，A我今天就不玩戰地了，我有事",
                image: "pic/e_1_2.png",
                choices: [
                    { text: "甚麼事啊，比好朋友還重要", next: "c_2_a_1" },
                    { text: "好喔", next: "c_2_a_2" },
                    { text: "什麼事我也要去", next: "c_2_a_2" }
                ]
            },
            "c_2_a_1": {
                speaker: "朋友",
                text: "少狗腿了",
                image: "pic/c_2_a_1.png",
                choices: [{ text: "【下一頁】", next: "c_2_a_2" }]
            },
            "c_2_a_2": {
                speaker: "朋友",
                text: "今天不是說NPC的伺服器要跟人類的伺服器拆分",
                image: "pic/c_2_a_2.png",
                choices: [
                    { text: "有這回事", next: "c_3_a_1" },
                    { text: "我知道阿", next: "e_3_1" }
                ]
            },
            "c_3_a_1": {
                speaker: "朋友",
                text: ":對啦，哈哈，沒在看預報齁",
                image: "pic/c_3_a_1.png",
                choices: [{ text: "【下一頁】", next: "c_2_a_2" }]
            },
            "e_3_1": {
                speaker: "朋友",
                text: ":所以今天玩戰地沒有NPC可以玩，那多無聊啊，只好下周再一起玩吧",
                image: "pic/e_3_1.png",
                choices: [{ text: "【下一頁】", next: "e_3_2" }]
            },
            "e_3_2": {
                speaker: "勇者",
                text: ":(掛電話))",
                image: "pic/e_3_2.png",
                choices: [{ text: "【下一頁】", next: "e_3_3" }]
            },
            "e_3_3": {
                speaker: "勇者",
                text: "伺服器是什麼阿，NPC不是很多嗎?查一下好了",
                image: "pic/e_3_3.png",
                choices: [{ text: "【下一頁】", next: "e_3_4" }]
            },
            "e_3_4": {
                speaker: "勇者",
                text: "人工智能:我問你喔，剛剛D說甚麼伺服器拆分，沒有NPC是甚麼意思",
                image: "pic/e_3_3.png",
                choices: [{ text: "【下一頁】", next: "e_3_" }]
            },
        };

        let typeTimer = null;
        let currentId = "start";
        let historyStack = [];

        function renderScene(id) {
            const scene = storyData[id];
            if (!scene) return;
            const dialogEl = document.getElementById('dialog-text');
            const speakerEl = document.getElementById('speaker-name');
            const photoEl = document.getElementById('scene-photo');
            const branchEl = document.getElementById('branch-container');
            const infoBtn = document.getElementById('info-trigger');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');

            speakerEl.innerText = scene.speaker;
            
            if (typeTimer) clearTimeout(typeTimer);

            // 更換圖片時先透明，onload 後會變回不透明 (這在 CSS 處理了)
            photoEl.style.opacity = 0;
            photoEl.src = scene.image;
            
            dialogEl.innerText = "";
            let i = 0;
            const type = () => {
                if (i <= scene.text.length) {
                    dialogEl.innerText = scene.text.slice(0, i);
                    i++;
                    typeTimer = setTimeout(type, 30); 
                }
            };
            type();

            if (scene.knowledge) {
                infoBtn.classList.remove('hidden');
                document.getElementById('knowledge-content').innerHTML = scene.knowledge;
            } else {
                infoBtn.classList.add('hidden');
            }

            prevBtn.disabled = (historyStack.length === 0);

            branchEl.innerHTML = "";
            if (scene.choices.length > 1) {
                nextBtn.style.display = "none";
                scene.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = "choice-btn w-full py-2 px-4 rounded-md text-left text-s tracking-wide text-gray-300 hover:text-cyan-400 animate-in fade-in slide-in-from-left-2 duration-500 fill-mode-forwards";
                    btn.innerText = `> ${choice.text}`;
                    btn.onclick = () => {
                        historyStack.push(currentId);
                        currentId = choice.next;
                        renderScene(currentId);
                    };
                    branchEl.appendChild(btn);
                });
            } else {
                nextBtn.style.display = "block";
                nextBtn.innerText = scene.choices[0].text.includes("【下一頁】") ? "下一頁 →" : scene.choices[0].text + " →";
                nextBtn.onclick = () => {
                    historyStack.push(currentId);
                    currentId = scene.choices[0].next;
                    renderScene(currentId);
                };
            }
        }

        function goBack() {
            if (historyStack.length > 0) {
                currentId = historyStack.pop();
                renderScene(currentId);
            }
        }

        function toggleKnowledge() {
            document.getElementById('knowledge-card').classList.toggle('active');
        }

        window.onload = () => {
            renderScene("start_1");
            const now = new Date();
            document.getElementById('date-display').innerText = `DATE: 2111.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getDate().toString().padStart(2,'0')}`;
        };
    </script>
</body>
</html>
